name: Feature Request
description: Propose new functionality
type: Feature
labels: ["feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should be built and why?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done?
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, references, related issues, etc.
    validations:
      required: false
